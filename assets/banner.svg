<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0070f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sapblue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0070f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="188" width="800" height="12" rx="0" fill="url(#accent)" opacity="0.8"/>

  <!-- SAP ABAP logo circle (left) -->
  <circle cx="72" cy="100" r="42" fill="#0070f3" opacity="0.15"/>
  <circle cx="72" cy="100" r="34" fill="none" stroke="#0070f3" stroke-width="2" opacity="0.5"/>
  <text x="72" y="107" font-size="18" font-weight="bold" fill="#0070f3" font-family="system-ui, sans-serif" text-anchor="middle" opacity="0.9">ABAP</text>

  <!-- Main title -->
  <text x="420" y="90" font-size="40" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">abap-ai-workspace</text>
  <!-- Subtitle -->
  <text x="420" y="128" font-size="15" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">AI-Assisted ABAP Development · VS Code + Claude Code</text>
  <!-- Tags -->
  <rect x="264" y="148" width="72" height="22" rx="11" fill="#0070f3" opacity="0.2"/>
  <text x="300" y="163" font-size="11" fill="#60a5fa" font-family="system-ui, sans-serif" text-anchor="middle">15 skills</text>
  <rect x="346" y="148" width="88" height="22" rx="11" fill="#0070f3" opacity="0.2"/>
  <text x="390" y="163" font-size="11" fill="#60a5fa" font-family="system-ui, sans-serif" text-anchor="middle">92 SAP docs</text>
  <rect x="444" y="148" width="90" height="22" rx="11" fill="#0070f3" opacity="0.2"/>
  <text x="489" y="163" font-size="11" fill="#60a5fa" font-family="system-ui, sans-serif" text-anchor="middle">MCP · RAP · CDS</text>

  <!-- Decorative nodes top-left -->
  <circle cx="150" cy="38" r="4" fill="#0070f3" opacity="0.5"/>
  <circle cx="185" cy="22" r="3" fill="#00b4d8" opacity="0.6"/>
  <circle cx="168" cy="58" r="5" fill="#0070f3" opacity="0.4"/>
  <line x1="150" y1="38" x2="185" y2="22" stroke="#0070f3" stroke-width="1" opacity="0.3"/>
  <line x1="185" y1="22" x2="168" y2="58" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
  <!-- Decorative nodes top-right -->
  <circle cx="650" cy="32" r="4" fill="#00b4d8" opacity="0.5"/>
  <circle cx="685" cy="55" r="5" fill="#0070f3" opacity="0.4"/>
  <circle cx="710" cy="28" r="3" fill="#00b4d8" opacity="0.6"/>
  <line x1="650" y1="32" x2="685" y2="55" stroke="#0070f3" stroke-width="1" opacity="0.3"/>
  <line x1="685" y1="55" x2="710" y2="28" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
  <!-- Claude icon hint (right) -->
  <circle cx="728" cy="100" r="42" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="728" cy="100" r="34" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
  <text x="728" y="107" font-size="14" font-weight="bold" fill="#a78bfa" font-family="system-ui, sans-serif" text-anchor="middle" opacity="0.9">Claude</text>
</svg>
